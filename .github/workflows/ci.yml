name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore landing-page-backend.sln

    - name: Build
      run: dotnet build landing-page-backend.sln --no-restore --configuration Release

    - name: Check code formatting
      run: dotnet format landing-page-backend.sln --verify-no-changes --no-restore

    - name: Run unit tests
      run: dotnet test landing-page-backend.Tests/landing-page-backend.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-test-results.trx"
    
    - name: Run integration tests
      run: dotnet test landing-page-backend.Tests.Integration/landing-page-backend.Tests.Integration.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/*test-results.trx'
